<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Haaythein & Niar - Undangan</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
overflow-x:hidden;
scroll-behavior:smooth;
color:white;
}

body.lock{
overflow:hidden;
height:100vh;
}

section{
position:relative;
height:100vh;
width:100%;
overflow:hidden;
}

video.bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* OPEN BUTTON */

.open{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(255,255,255,0.2);
border:1px solid white;
padding:12px 28px;
border-radius:30px;
font-size:16px;
color:white;
cursor:pointer;
backdrop-filter:blur(6px);
}

/* MAP BUTTON */

.map-btn{
position:absolute;
bottom:140px;
left:50%;
transform:translateX(-50%);
font-size:26px;
color:#fff;
background:rgba(0,0,0,0.3);
border:1px solid white;
border-radius:30px;
padding:8px 22px;
text-decoration:none;
}

/* GIFT */

.gift{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
max-width:400px;
}

.title{
font-family:'Playfair Display',serif;
font-size:28px;
margin-bottom:20px;
}

.card{
margin-bottom:30px;
}

.number{
font-size:20px;
margin-top:5px;
}

button{
margin-top:10px;
padding:6px 16px;
border-radius:20px;
border:1px solid white;
background:rgba(255,255,255,0.2);
color:white;
}

/* RSVP */

.rsvp{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:380px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
backdrop-filter:blur(6px);
}

.rsvp input,
.rsvp select,
.rsvp textarea{
width:100%;
margin:5px 0 10px 0;
padding:8px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.2);
color:white;
}

.comments{
margin-top:10px;
max-height:120px;
overflow:auto;
font-size:14px;
}

</style>
</head>

<body class="lock">

<!-- MUSIK -->

<audio id="musik" loop>
<source src="musik.mp3" type="audio/mpeg">
</audio>

<!-- OPENING -->

<section>

<video id="openingVideo" class="bg" muted playsinline>
<source src="pengantin.mp4" type="video/mp4">
</video>

<button class="open" onclick="openInvite()">
Buka Undangan
</button>

</section>

<!-- LOKASI -->

<section>

<video class="bg" autoplay muted loop playsinline>
<source src="lokasi.mp4">
</video>

<a class="map-btn" href="https://maps.app.goo.gl/ya31ZLyKFNwCD7BL9?g_st=aw" target="_blank">
Maps Lokasi
</a>

</section>

<!-- GALLERY -->

<section>
<video class="bg" autoplay muted loop playsinline>
<source src="gallery.mp4">
</video>
</section>

<!-- STORY -->

<section>
<video class="bg" autoplay muted loop playsinline>
<source src="story.mp4">
</video>
</section>

<!-- GIFT -->

<section>

<video class="bg" autoplay muted loop playsinline>
<source src="gift.mp4">
</video>

<div class="gift">

<h2 class="title">Wedding Gift</h2>

<div class="card">
BCA
<div class="number" id="rek1">1234567890</div>
<button onclick="copyText('rek1')">Salin</button>
</div>

<div class="card">
MANDIRI
<div class="number" id="rek2">9876543210</div>
<button onclick="copyText('rek2')">Salin</button>
</div>

</div>

</section>

<!-- RSVP -->

<section>

<video class="bg" autoplay muted loop playsinline>
<source src="rsvp.mp4">
</video>

<div class="rsvp">

<h3>RSVP & Ucapan</h3>

<form id="form">

<input id="nama" placeholder="Nama" required>

<select id="hadir" required>
<option value="">Kehadiran</option>
<option>Hadir</option>
<option>Tidak Hadir</option>
</select>

<textarea id="pesan" placeholder="Ucapan"></textarea>

<button>Kirim</button>

</form>

<div class="comments" id="comments"></div>

</div>

</section>

<!-- PENUTUP -->

<section>
<video class="bg" autoplay muted loop playsinline>
<source src="penutup.mp4">
</video>
</section>

<script>

/* OPEN UNDANGAN */

const video = document.getElementById("openingVideo")
const musik = document.getElementById("musik")

function openInvite(){

video.play()

musik.currentTime = 0
musik.play()

}

/* UNLOCK SCROLL */

video.addEventListener("ended",function(){

document.body.classList.remove("lock")

})

/* COPY */

function copyText(id){

let text = document.getElementById(id).innerText

navigator.clipboard.writeText(text)

alert("Nomor rekening disalin")

}

/* RSVP */

const form = document.getElementById("form")
const comments = document.getElementById("comments")

form.addEventListener("submit",function(e){

e.preventDefault()

let nama = document.getElementById("nama").value
let hadir = document.getElementById("hadir").value
let pesan = document.getElementById("pesan").value

let div = document.createElement("div")

div.innerHTML = "<b>"+nama+"</b> ("+hadir+")<br>"+pesan+"<hr>"

comments.prepend(div)

form.reset()

})

</script>

</body>
</html>
